## Requires Prometheus Operator. Skip if not using it.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: redis-alerts
  namespace: redis-ha
  labels:
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    - name: redis.rules
      rules:
        - alert: RedisDown
          expr: redis_up == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Redis instance {{ $labels.instance }} is down"

        - alert: RedisMemoryHigh
          expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Redis memory > 85% on {{ $labels.instance }}"

        - alert: RedisReplicationLag
          expr: redis_connected_slaves < 1
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Redis master has no connected replicas"

        - alert: RedisRejectedConnections
          expr: increase(redis_rejected_connections_total[1m]) > 0
          labels:
            severity: warning
          annotations:
            summary: "Redis is rejecting connections on {{ $labels.instance }}"
